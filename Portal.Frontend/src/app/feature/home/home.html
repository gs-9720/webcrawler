<header class="hero pb-0">
    <div class="container">
        <h1 class="hero-title">Get a Free Website SEO Audit</h1>
        <p class="hero-description mt-4">
           Get a free website audit to check your site’s SEO, performance, headings, metadata, and technical issues. Enter your website URL and start your audit instantly — no credit card required.
        </p>
        <div class="my-5">

            <div class="container-tight">
                <div class="row g-3 justify-content-center">
                    <div class="col">
                        <input class="w-100 form-control" name="websiteUrl" placeholder="Website URL" type="text" [(ngModel)]="websiteUrl">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary" (click)="startAudit()">
                            Start Audit</button>
                    </div>
                </div>
            </div>

        </div>
        <div class="hero-img img-overlap-margin">
            <div class="browser">
                <div class="browser-header">
                    <div class="row align-items-center">
                        <div class="col-auto col-md-2">
                            <div class="browser-dots browser-dots-colored">
                                <div class="browser-dot"></div>
                                <div class="browser-dot"></div>
                                <div class="browser-dot"></div>
                            </div>
                        </div>
                        <div class="col-8">
                            <a href="https://preview.tabler.io" class="browser-input" target="_blank"
                                rel="noopener noreferrer" data-bs-toggle="tooltip" data-bs-placement="top"
                                data-bs-original-title="Open preview of Tabler dashboard!">
                                <!-- Download SVG icon from http://tabler.io/icons/icon/lock -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" aria-hidden="true" focusable="false"
                                    class="icon me-2 text-green icon-sm">
                                    <path
                                        d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6">
                                    </path>
                                    <path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0"></path>
                                    <path d="M8 11v-4a4 4 0 1 1 8 0v4"></path>
                                </svg>
                                https://zwebsl.com/
                            </a>
                        </div>
                    </div>
                </div>


                <picture>
                    <img src="../img/home-img.png"
                       alt=""
                        class="img-fluid " width="1040" height="760" loading="lazy">
                </picture>

            </div>
        </div>
    </div>
</header>
